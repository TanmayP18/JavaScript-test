<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
        <title>Document</title>
        <style>
            :root {
                --bg: #f5f7fb;
                --surface: rgba(255, 255, 255, 0.92);
                --ink: #172033;
                --muted: #64748b;
                --line: #d9e2ef;
                --brand: #2563eb;
                --brand-dark: #1d4ed8;
                --danger: #e11d48;
                --success: #16a34a;
                --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            }

            * {
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                margin: 0;
                color: var(--ink);
                font-family: "Segoe UI", Arial, sans-serif;
                background:
                    radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 34rem),
                    linear-gradient(135deg, #f8fbff 0%, var(--bg) 48%, #eef4ff 100%);
            }

            h4 {
                width: min(92%, 760px);
                margin: 34px auto 18px !important;
                padding: 0 !important;
                color: var(--ink);
                font-weight: 700;
                line-height: 1.35;
                text-align: center;
            }

            h4::after {
                content: "";
                display: block;
                width: 58px;
                height: 4px;
                margin: 12px auto 0;
                border-radius: 999px;
                background: linear-gradient(90deg, var(--brand), #14b8a6);
            }

            hr {
                width: min(92%, 860px);
                margin: 34px auto;
                border: 0;
                border-top: 1px solid rgba(100, 116, 139, 0.24);
            }

            .container,
            .container-fluid {
                width: min(92%, 920px);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-wrap: wrap;
                gap: 18px;
                padding: 0;
            }

            .card,
            form {
                border: 1px solid rgba(217, 226, 239, 0.9);
                border-radius: 18px;
                background: var(--surface);
                box-shadow: var(--shadow);
            }

            .card {
                margin-top: 0;
                padding: 24px;
            }

            form {
                width: min(100%, 430px);
                padding: 24px;
            }

            .card form {
                width: 100%;
                padding: 0;
                border: 0;
                border-radius: 0;
                background: transparent;
                box-shadow: none;
            }

            label {
                margin-bottom: 8px;
                color: #334155;
                font-size: 0.95rem;
                font-weight: 650;
            }

            form input {
                width: 100%;
                min-height: 44px;
                margin: 0 0 16px;
                padding: 10px 13px;
                border: 1px solid var(--line);
                border-radius: 12px;
                color: var(--ink);
                background: #fbfdff;
                outline: none;
                transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            }

            form input:focus {
                border-color: var(--brand);
                box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
                transform: translateY(-1px);
            }

            .btn {
                min-height: 42px;
                margin: 4px;
                padding: 9px 18px;
                border: 0;
                border-radius: 999px;
                font-weight: 700;
                letter-spacing: 0;
                box-shadow: 0 9px 18px rgba(15, 23, 42, 0.12);
                transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 13px 24px rgba(15, 23, 42, 0.16);
                filter: saturate(1.07);
            }

            .btn:active {
                transform: translateY(0);
            }

            .btn-primary,
            #blue {
                background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            }

            .btn-danger,
            #red {
                background: linear-gradient(135deg, var(--danger), #be123c);
            }

            .btn-success,
            #green {
                background: linear-gradient(135deg, var(--success), #15803d);
            }

            #odd,
            #even,
            #def {
                color: #1f2937;
                background: #e8eef7;
            }

            .f1 {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
            }

            .f1 > div {
                width: 100%;
                display: grid;
                grid-template-columns: auto minmax(110px, 1fr) auto;
                align-items: center;
                gap: 8px;
                margin-bottom: 10px;
            }

            .f1 input {
                margin: 0;
                text-align: center;
            }

            #courselist,
            #nameList {
                min-height: 54px;
                margin-top: 18px;
                color: var(--muted);
                font-weight: 600;
                text-align: center;
            }

            .noteCard.card {
                align-items: stretch;
                justify-content: flex-start;
                padding: 0;
                overflow: hidden;
                border-radius: 16px;
                text-align: left;
                box-shadow: 0 14px 30px rgba(15, 23, 42, 0.11);
            }

            .noteCard .card-body {
                padding: 18px;
            }

            .noteCard .card-title {
                margin-bottom: 8px;
                color: var(--brand-dark);
                font-size: 1rem;
                font-weight: 750;
            }

            .noteCard .card-text {
                margin: 0;
                color: #475569;
            }

            #dl {
                width: min(100%, 420px);
                margin: 0;
                padding: 20px 24px;
                border: 1px solid rgba(217, 226, 239, 0.9);
                border-radius: 18px;
                background: var(--surface);
                box-shadow: var(--shadow);
                list-style: none;
            }

            #dl li {
                position: relative;
                padding: 10px 10px 10px 30px;
                color: #334155;
                font-weight: 650;
            }

            #dl li::before {
                content: "";
                position: absolute;
                top: 17px;
                left: 8px;
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background: #14b8a6;
                box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.14);
            }

            center {
                display: block;
                width: min(92%, 920px);
                margin: 0 auto;
            }

            @media (max-width: 560px) {
                body {
                    background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
                }

                h4 {
                    font-size: 1.05rem;
                }

                .card,
                form {
                    padding: 18px;
                    border-radius: 14px;
                }

                .f1 > div {
                    grid-template-columns: 1fr;
                }

                .btn {
                    width: 100%;
                    margin: 5px 0;
                }
            }
        </style>
    </head>
    <body>
        <!-- Q1. Student Information Card -->
        <h4 style="text-align: center; padding-top: 40px; margin-bottom: 0px;">Q1. Student Information Card</h4><br>
        <div class="container">
            <div class="card">
                <form>
                    <label for="name">Student Name:</label><br>
                    <input type="text" name="name" id="name"><br>
                    <label for="course">Course:</label><br>
                    <input type="text" name="course" id="course"><br>
                    <button class="btn btn-primary " type="submit" id="save">Submit</button>
                    <button id="dlt0" class="btn btn-danger">Delete All</button>
                </form>
            </div>
        </div>
        <div id="courselist" class="container">


        </div>
        <hr>

        <!-- Q2. Even and Odd Number Checker -->
        <h4 style="text-align: center; padding-top: 10px; padding-bottom: 0px;">Q2. Even and Odd Number Checker</h4>
        <div class="container-fluid">
            <form action="" class="f1">
                <label for="no">Enter a Number to check whether it's odd or even:</label><br>
                <div>
                    <button class="btn" id="odd" type="button" >ODD</button>
                    <input type="number" name="no" id="no">
                    <button class="btn" id="even" type="button">EVEN</button><br>
                </div>
                <button class="btn btn-success" id="checkBtn" >Check</button>
            </form>
        </div>
        <hr>

        <!-- Q3. Dynamic List using Array  -->
        <h4 style="text-align: center; padding-top: 10px; padding-bottom: 0px;">Q3. Dynamic List using Array </h4>
        <div class="container">
            <ul id="dl">
                
            </ul>
        </div>
        <hr>

        <!-- Q4. Background Color Changer -->
        <h4 style="text-align: center; padding-top: 10px; padding-bottom: 0px;">Q4. Background Color Changer</h4>
        <div class="container" style="display: flex; justify-content: space-evenly; margin-top: 20px; margin-bottom: 20px;">
            <button type="submit" class="btn btn-danger" id="red">RED</button>
            <button class="btn btn-success" id="green">GREEN</button>
            <button class="btn btn-primary" id="blue">BLUE</button>
        </div>
        <center><button class="btn" id="def">Default</button></center>
        <hr>
        
        <!-- Q5. Store and Display User Name using Local Storage -->
        <h4 style="text-align: center; padding-top: 10px; padding-bottom: 0px;">Q5. Store and Display User Name using Local Storage</h4>
        <div class="container">
            <form action="">
                <label for="nm">
                    Name:
                </label><br>
                <input type="text" name="nm" id="names"  placeholder="Enter name">
                <button id="saveBtn" class="btn btn-primary" type="submit">Save</button>
                <button id="dlt" class="btn btn-danger">Delete All</button>
            </form>
        </div>
        <div id="nameList" class="container" style="display: flex; flex-wrap: wrap; "></div>
        <hr>
        <br>
        <script src="js_test.js"></script>
    </body>
</html>
